spring:
  application:
    name: BabyShop
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/BabyShop_bd}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  upload-dir: uploads/products/
  cors-origins: ${CORS_ORIGINS:http://localhost:4200}

jwt:
  secret: ${JWT_SECRET:ZGV2LWJhYnlzaG9wLWxvY2FsLWp3dC1zZWNyZXQtbWluLTMyLWJ5dGVzLWtleQ==}
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: ${PORT:8081}