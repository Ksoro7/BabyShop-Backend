spring:
  application:
    name: BabyShop

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/BabyShop_bd}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  mail:
    host: smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USERNAME:test_user}
    password: ${MAIL_PASSWORD:test_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: http://localhost:8081
  upload-dir: uploads/products/

jwt:
  # @change [PROD-READY] Secret externalisé via variable d'environnement - 2026-06-12
  # @change [PROD-READY] Valeur par défaut Base64 valide pour le dev - 2026-06-12
  secret: ${JWT_SECRET:ZGV2LWJhYnlzaG9wLWxvY2FsLWp3dC1zZWNyZXQtbWluLTMyLWJ5dGVzLWtleQ==}
  expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8081
