spring:
  datasource:
    url: ${NEON_DB_URL:jdbc:postgresql://localhost:5432/babyshop_bd}
    username: ${NEON_DB_USERNAME:postgres}
    password: ${NEON_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

app:
  base-url: http://localhost:8081
  cors-origins: http://localhost:4200
  cookie-secure: false

admin:
  email: ${ADMIN_EMAIL:admin@babyshop.com}
  password: ${ADMIN_PASSWORD:admin123}