spring:
  datasource:
    url: jdbc:postgresql://dpg-d8jvn31kh4rs73ek3eeg-a:5432/babyshop_bd
    username: babyshop_bd_user
    password: ${DB_PASSWORD:YczipdORT87uHwucvGUm8IljrII3i83n}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000
      leak-detection-threshold: 60000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  base-url: ${APP_BASE_URL:https://rabishop-backend.onrender.com}
  cors-origins: ${CORS_ORIGINS:http://localhost:4200,https://babyshop-frontend-ci.onrender.com,https://*.onrender.com}

jwt:
  secret: ${JWT_SECRET}

admin:
  email: ${ADMIN_EMAIL:admin@rabishop.com}
  password: ${ADMIN_PASSWORD:Admin123!}

cinetpay:
  api-key: ${CINETPAY_API_KEY:}
  site-id: ${CINETPAY_SITE_ID:}
  notify-url: ${APP_BASE_URL:https://rabishop-backend.onrender.com}/api/payments/webhook
  return-url: ${APP_BASE_URL:https://rabishop-backend.onrender.com}
  sandbox: ${CINETPAY_SANDBOX:false}

server:
  port: ${PORT:8081}